<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Rabbi Hossain LTD</title>
  <meta name="description" content="Admin panel for manual credit and service payment approval." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .admin-page { min-height:100vh; padding:110px 16px 60px; background:radial-gradient(circle at top,rgba(0,255,136,.08),transparent 30%),#02050a; }
    .admin-wrap { max-width:1000px; margin:0 auto; }
    .admin-denied { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#02050a; color:#e8edf5; text-align:center; padding:20px; }
    .admin-denied div { max-width:400px; background:rgba(255,255,255,.06); border:1px solid rgba(255,80,80,.22); border-radius:24px; padding:34px; }
    .admin-denied a { color:#00c8ff; text-decoration:none; font-weight:700; }
    .admin-nav { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
    @media(min-width:640px){ .admin-nav { grid-template-columns:repeat(4,1fr); } }
    .admin-nav-btn { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:20px 12px; border-radius:20px; border:1px solid rgba(0,200,255,.16); background:rgba(255,255,255,.04); color:#8aaac8; font-weight:900; font-size:.82rem; cursor:pointer; transition:.22s ease; text-align:center; position:relative; font-family:inherit; }
    .admin-nav-btn svg { width:26px; height:26px; stroke-width:1.6; color:#00c8ff; flex-shrink:0; }
    .admin-nav-btn:hover { border-color:rgba(0,200,255,.35); background:rgba(0,200,255,.07); color:#c2e4f8; transform:translateY(-2px); }
    .admin-nav-btn.active { background:linear-gradient(135deg,rgba(0,200,255,.16),rgba(0,255,136,.10)); border-color:rgba(0,200,255,.45); color:#e8edf5; box-shadow:0 8px 28px rgba(0,200,255,.12); }
    .admin-nav-badge { position:absolute; top:10px; right:10px; min-width:20px; height:20px; border-radius:999px; background:#ff5050; color:#fff; font-size:.68rem; font-weight:900; display:flex; align-items:center; justify-content:center; padding:0 5px; border:2px solid #02050a; }
    .admin-panel { display:none; animation:panelIn .22s ease; margin-top:16px; }
    .admin-panel.active { display:block; }
    @keyframes panelIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
    .admin-card-shell { background:rgba(255,255,255,.05); border:1px solid rgba(0,200,255,.14); border-radius:20px; padding:20px; box-shadow:0 16px 50px rgba(0,0,0,.35); }
    .admin-panel-head { display:flex; align-items:center; gap:12px; margin-bottom:18px; padding-bottom:14px; border-bottom:1px solid rgba(255,255,255,.07); }
    .admin-panel-head svg { width:22px; height:22px; color:#00c8ff; flex-shrink:0; stroke-width:1.7; }
    .admin-panel-head h2 { color:#e8edf5; font-size:1.1rem; margin:0; }
    .admin-list { display:grid; gap:14px; }
    .admin-card { background:rgba(255,255,255,.055); border:1px solid rgba(0,200,255,.14); border-radius:18px; padding:18px; }
    .admin-card h3 { color:#00ff88; font-size:1.25rem; margin:0 0 4px; word-break:break-word; }
    .admin-card p { color:#c9d4e5; margin:6px 0; font-size:.9rem; word-break:break-word; }
    .admin-card-head { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; margin-bottom:10px; flex-wrap:wrap; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
    @media(max-width:420px){ .actions { grid-template-columns:1fr; } }
    .btn-confirm { border:0; border-radius:999px; padding:12px 16px; font-weight:900; cursor:pointer; background:linear-gradient(135deg,#00c8ff,#00ff88); color:#02050a; font-family:inherit; font-size:.88rem; }
    .btn-decline { border:1px solid rgba(255,80,80,.3); border-radius:999px; padding:12px 16px; font-weight:900; cursor:pointer; background:rgba(255,80,80,.10); color:#ffb0b0; font-family:inherit; font-size:.88rem; }
    .btn-auto { border:1px solid rgba(0,200,255,.22); border-radius:999px; padding:10px 14px; font-weight:900; cursor:pointer; background:rgba(0,200,255,.08); color:#9ee8ff; font-family:inherit; font-size:.82rem; }
    .status { padding:4px 10px; border-radius:999px; font-size:.72rem; text-transform:uppercase; font-weight:900; white-space:nowrap; }
    .status.pending { color:#ffe7a3; background:rgba(255,200,80,.12); }
    .status.approved,.status.accepted,.status.confirmed,.status.completed { color:#a7ffcf; background:rgba(0,255,136,.12); }
    .status.declined { color:#ffb0b0; background:rgba(255,80,80,.12); }
    .empty-state { color:#7a8ca8; text-align:center; padding:28px 0; font-size:.9rem; }
    .admin-details { margin-top:10px; background:rgba(0,0,0,.22); border:1px solid rgba(255,255,255,.07); border-radius:14px; padding:12px; color:#c9d4e5; }
    .admin-details pre { margin:8px 0 0; white-space:pre-wrap; word-break:break-word; color:#8fa2bb; font-size:.8rem; line-height:1.5; }
    .coupon-form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
    @media(max-width:420px){ .coupon-form-grid { grid-template-columns:1fr; } }
    .form-label-small { display:block; color:#8fa2bb; font-size:.78rem; margin-bottom:6px; font-weight:700; }
    .form-input-small { width:100%; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:10px; padding:10px 12px; color:#e8edf5; font-size:.9rem; font-family:inherit; outline:none; box-sizing:border-box; }
    .form-input-small:focus { border-color:rgba(0,200,255,.42); }
    .coupon-create-box { background:rgba(0,200,255,.06); border:1px solid rgba(0,200,255,.18); border-radius:16px; padding:18px; margin-bottom:18px; }
    .coupon-msg { display:none; padding:10px 14px; border-radius:10px; font-size:.83rem; font-weight:700; margin-top:10px; }
    .coupon-msg.success { background:rgba(0,255,136,.10); border:1px solid rgba(0,255,136,.25); color:#a7ffcf; display:block; }
    .coupon-msg.error { background:rgba(255,80,80,.10); border:1px solid rgba(255,80,80,.22); color:#ffb0b0; display:block; }
    .support-grid { display:none; } /* legacy — replaced */
    /* ── Admin Inbox list ── */
    .admin-inbox-list { display:flex; flex-direction:column; gap:0; border-radius:14px; overflow:hidden; border:1px solid rgba(255,255,255,.07); }
    .inbox-item { padding:13px 16px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.05); transition:background .15s; display:grid; grid-template-columns:1fr auto; gap:6px; align-items:center; background:rgba(0,0,0,.15); }
    .inbox-item:last-child { border-bottom:none; }
    .inbox-item:hover { background:rgba(0,200,255,.07); }
    .inbox-item.active { background:rgba(0,200,255,.11); }
    .inbox-item-left { min-width:0; }
    .inbox-item-name { font-weight:900; color:#d0eaff; font-size:.88rem; display:flex; align-items:center; gap:7px; }
    .inbox-status-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .inbox-status-dot.open   { background:#00c8ff; }
    .inbox-status-dot.solved { background:#00e67a; }
    .inbox-item-ticket { font-size:.72rem; color:#4a6880; font-family:monospace; margin-top:2px; }
    .inbox-item-preview { font-size:.78rem; color:#6a8090; margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .inbox-item-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
    .inbox-unread-badge { min-width:20px; height:20px; border-radius:99px; background:#ff5050; color:#fff; font-size:.68rem; font-weight:900; display:flex; align-items:center; justify-content:center; padding:0 5px; }
    .inbox-status-label { font-size:.7rem; padding:2px 8px; border-radius:99px; font-weight:700; white-space:nowrap; }
    .inbox-status-label.open   { background:rgba(0,200,255,.12); color:#00c8ff; border:1px solid rgba(0,200,255,.25); }
    .inbox-status-label.solved { background:rgba(0,230,122,.1); color:#00e67a; border:1px solid rgba(0,230,122,.22); }
    /* ── Admin Chat window ── */
    .admin-chat-header { display:flex; align-items:center; gap:10px; padding:11px 14px; background:rgba(0,200,255,.06); border:1px solid rgba(0,200,255,.14); border-radius:14px 14px 0 0; flex-wrap:wrap; }
    .admin-chat-back { background:none; border:1px solid rgba(255,255,255,.12); border-radius:8px; color:#7a8ca8; cursor:pointer; padding:6px 12px; font-size:.8rem; font-family:inherit; display:flex; align-items:center; gap:6px; transition:.15s; }
    .admin-chat-back:hover { color:#d0eaff; border-color:rgba(255,255,255,.22); }
    .admin-chat-user-info { flex:1; min-width:0; }
    .admin-chat-user-info span:first-child { font-weight:900; color:#d0eaff; font-size:.9rem; display:block; }
    .admin-chat-user-info span:last-child  { font-size:.74rem; color:#5a7090; font-family:monospace; }
    .admin-chat-msgs { background:rgba(0,0,0,.2); border-left:1px solid rgba(0,200,255,.1); border-right:1px solid rgba(0,200,255,.1); min-height:280px; max-height:380px; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:9px; scroll-behavior:smooth; }
    .admin-chat-msgs::-webkit-scrollbar { width:4px; }
    .admin-chat-msgs::-webkit-scrollbar-thumb { background:rgba(0,200,255,.2); border-radius:2px; }
    .chat-msg-user  { align-self:flex-start; max-width:80%; }
    .chat-msg-admin { align-self:flex-end;   max-width:80%; }
    .chat-msg-bubble { padding:9px 13px; border-radius:14px; font-size:.84rem; line-height:1.5; word-break:break-word; }
    .chat-msg-user  .chat-msg-bubble { background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.09); color:#d0eaff; border-bottom-left-radius:4px; }
    .chat-msg-admin .chat-msg-bubble { background:rgba(0,200,255,.14); border:1px solid rgba(0,200,255,.24); color:#d0eaff; border-bottom-right-radius:4px; }
    .chat-msg-time { font-size:.7rem; color:#4a6070; margin-top:3px; }
    .chat-msg-user .chat-msg-time  { text-align:left; }
    .chat-msg-admin .chat-msg-time { text-align:right; }
    .admin-chat-reply-row { border:1px solid rgba(0,200,255,.14); border-top:0; border-radius:0 0 14px 14px; padding:10px 12px; display:flex; gap:8px; align-items:center; background:rgba(0,0,0,.15); }
    .chat-reply-input { flex:1; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.10); border-radius:10px; padding:9px 12px; color:#e8edf5; font-size:.86rem; font-family:inherit; outline:none; }
    .chat-reply-btn   { border:0; border-radius:10px; padding:9px 20px; background:linear-gradient(135deg,#00c8ff,#00ff88); color:#02050a; font-weight:900; cursor:pointer; font-size:.84rem; font-family:inherit; }
    .chat-solved-btn  { border:1px solid rgba(0,230,122,.4); border-radius:10px; padding:7px 14px; background:rgba(0,230,122,.12); color:#00e67a; font-weight:900; cursor:pointer; font-size:.82rem; font-family:inherit; display:flex; align-items:center; gap:6px; transition:.17s; white-space:nowrap; }
    .chat-solved-btn:hover { background:rgba(0,230,122,.22); border-color:rgba(0,230,122,.6); }
    .chat-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#4a6070; font-size:.88rem; padding:30px; text-align:center; }
  </style>
</head>

      <!-- Navigation buttons -->
      <nav class="admin-nav" aria-label="Admin panels">
        <button class="admin-nav-btn active" type="button" onclick="adminShowPanel('Services')" id="navBtnServices">

        </button>
        <button class="admin-nav-btn" type="button" onclick="adminShowPanel('Support')" id="navBtnSupport">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
          Live Support
          <span class="admin-nav-badge" id="badgeSupport" style="display:none;"></span>
        </button>
      </nav>

      <!-- Panel: Pending Services -->
      <div class="admin-panel active" id="panelServices">
        <div class="admin-card-shell">
          <div class="admin-panel-head">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M6.25 4.75h11.5v14.5H6.25V4.75Z"/><path d="M8.75 8.25h6.5M8.75 12h6.5M8.75 15.75h3.5"/></svg>
            <h2>Pending Services</h2>
          </div>
          <div id="adminOrderList" class="admin-list">
            <div class="empty-state">Loading service orders...</div>
          </div>
        </div>
      </div>

      <!-- Panel: Pending Transactions -->
      <div class="admin-panel" id="panelTransactions">
        <div class="admin-card-shell">
          <div class="admin-panel-head">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M4.5 7.5h15a1.75 1.75 0 0 1 1.75 1.75v7.5A1.75 1.75 0 0 1 19.5 18.5h-15a1.75 1.75 0 0 1-1.75-1.75v-7.5A1.75 1.75 0 0 1 4.5 7.5Z"/><path d="M2.75 10.25h18.5M6.75 15.5h3.5"/></svg>
            <h2>Pending Transactions</h2>
          </div>
          <div id="adminTopupList" class="admin-list">
            <div class="empty-state">Loading payment requests...</div>
          </div>
        </div>
      </div>

      <!-- Panel: Create Coupon -->
      <div class="admin-panel" id="panelCoupons">
        <div class="admin-card-shell">
          <div class="admin-panel-head">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><circle cx="7" cy="7" r="1" fill="currentColor"/></svg>
            <h2>Coupon Management</h2>
          </div>
          <div class="coupon-create-box">
            <div class="coupon-form-grid">
              <div>
                <label class="form-label-small">Coupon Code</label>
                <input id="newCouponCode" type="text" placeholder="e.g. SAVE20" autocomplete="off" class="form-input-small" />
              </div>
              <div>
                <label class="form-label-small">Discount %</label>
                <input id="newCouponDiscount" type="number" min="1" max="100" placeholder="e.g. 20" class="form-input-small" />
              </div>
            </div>
            <div class="coupon-form-grid">
              <div>
                <label class="form-label-small">Expires At (optional)</label>
                <input id="newCouponExpiry" type="date" class="form-input-small" />
              </div>
              <div>
                <label class="form-label-small">Max Uses (optional)</label>
                <input id="newCouponMaxUses" type="number" min="1" placeholder="e.g. 50 (unlimited if blank)" class="form-input-small" />
              </div>
            </div>
            <button type="button" class="btn-confirm" style="width:100%;margin-top:4px;" onclick="adminCreateCoupon()">
              Create Coupon
            </button>
            <div id="couponCreateMsg" class="coupon-msg"></div>
          </div>
          <div id="adminCouponList" class="admin-list">
            <div class="empty-state">Loading coupons...</div>
          </div>
        </div>
      </div>

      <!-- Panel: Live Support -->
      <div class="admin-panel" id="panelSupport">
        <div class="admin-card-shell">
          <div class="admin-panel-head">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
            <h2>Support Inbox</h2>
          </div>

          <!-- Ticket list (always visible) -->
          <div id="adminChatRooms" class="admin-inbox-list">
            <div style="padding:14px;color:#4a6070;font-size:.84rem;text-align:center;">Loading tickets...</div>
          </div>

          <!-- Chat window (shown when a ticket is selected) -->
          <div id="adminChatWindow" style="display:none; margin-top:14px;">

                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>

                  <span id="adminChatUserName" style="font-weight:800;color:#e8edf5;font-size:.92rem;"></span>
                  <span id="adminChatTicketId" style="font-size:.75rem;color:#00c8ff;margin-left:6px;"></span>
                </div>
                <button type="button" class="chat-solved-btn" onclick="adminMarkSolved()">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                  Solved
                </button>
              </div>
              <!-- User details row -->
              <div id="adminChatUserDetails" style="width:100%;margin-top:8px;padding:10px 12px;background:rgba(0,200,255,.05);border:1px solid rgba(0,200,255,.12);border-radius:10px;display:flex;flex-direction:column;gap:5px;">
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  <span style="font-size:.75rem;color:#7a8ca8;">📧 Email:</span>
                  <span id="adminChatUserEmail" style="font-size:.75rem;color:#c8ddf0;font-weight:600;"></span>
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                  <span style="font-size:.75rem;color:#7a8ca8;">📞 Phone:</span>
                  <span id="adminChatUserPhone" style="font-size:.75rem;color:#c8ddf0;font-weight:600;"></span>
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start;">
                  <span style="font-size:.75rem;color:#7a8ca8;white-space:nowrap;">💬 Complaint:</span>
                  <span id="adminChatUserComplaint" style="font-size:.75rem;color:#c8ddf0;font-weight:600;line-height:1.5;"></span>
                </div>
              </div>
            </div>
            <div id="adminChatMsgs" class="admin-chat-msgs"></div>
            <div class="admin-chat-reply-row">
              <input type="text" id="adminReplyInput" class="chat-reply-input" placeholder="Reply লিখুন..." />
              <button type="button" class="chat-reply-btn" onclick="adminSendReply()">Send</button>
            </div>
          </div>

        </div>
      </div>

      <p id="adminInfo" style="color:#4a6070;font-size:.78rem;text-align:center;margin-top:14px;"></p>

    </div>
  </main>

  <script>
  function adminShowPanel(name) {
    ['Services','Transactions','Coupons','Support'].forEach(p => {
      const panel = document.getElementById('panel' + p);
      const btn = document.getElementById('navBtn' + p);
      if (panel) panel.classList.toggle('active', p === name);
      if (btn) btn.classList.toggle('active', p === name);
    });
  }
  </script>

  <script src="js/auth.js"></script>
  <script type="module" src="js/wallet.js"></script>

  <script type="module">
  import { auth, db } from './js/firebase-core.js';
  import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js';
  import {
    collection, doc, getDoc, setDoc, addDoc, onSnapshot,
    serverTimestamp, query, orderBy, Timestamp, updateDoc
  } from 'https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js';

  const ADMIN_EMAILS = ["rabbihossainltd@gmail.com"];
  let adminUser = null;
  let activeChatUid = null;
  let unsubChatMsgs = null;

  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  onAuthStateChanged(auth, async (user) => {
    if (!user || !ADMIN_EMAILS.includes(user.email)) return;
    adminUser = user;
    const info = document.getElementById('adminInfo');
    if (info) info.textContent = 'Logged in as ' + user.email;
    loadCoupons();
    loadSupportRooms();
  });

  /* ── Coupon Management ── */
  function loadCoupons() {
    const list = document.getElementById('adminCouponList');
    if (!list) return;
    onSnapshot(collection(db, 'coupons'), (snap) => {
      list.innerHTML = '';
      if (snap.empty) { list.innerHTML = '<div class="empty-state">No coupons created yet.</div>'; return; }
      snap.forEach(docSnap => {
        const d = docSnap.data();
        const code = docSnap.id;
        const active = d.active !== false;
        const exp = d.expiresAt ? (d.expiresAt.toDate ? d.expiresAt.toDate().toLocaleDateString() : d.expiresAt) : 'No expiry';
        const usageInfo = d.maxUses ? `${d.usedCount||0}/${d.maxUses} used` : `${d.usedCount||0} used (unlimited)`;
        list.innerHTML += `<div class="admin-card" style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <div style="flex:1;">
            <h3 style="font-family:monospace;letter-spacing:.06em;">${escHtml(code)}</h3>
            <p>${d.discountPercent}% discount &mdash; Expires: ${escHtml(String(exp))} &mdash; <strong>${escHtml(usageInfo)}</strong></p>
          </div>
          <span class="status ${active ? 'approved' : 'declined'}">${active ? 'Active' : 'Inactive'}</span>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="${active ? 'btn-decline' : 'btn-confirm'}" style="padding:8px 14px;font-size:.8rem;" onclick="adminToggleCoupon('${escHtml(code)}',${active})">${active ? 'Deactivate' : 'Activate'}</button>
            <button class="btn-decline" style="padding:8px 14px;font-size:.8rem;" onclick="adminDeleteCoupon('${escHtml(code)}')">Delete</button>
          </div>
        </div>`;
      });
    });
  }

  window.adminCreateCoupon = async function() {
    const code    = document.getElementById('newCouponCode')?.value.trim().toUpperCase();
    const pct     = Number(document.getElementById('newCouponDiscount')?.value);
    const expVal  = document.getElementById('newCouponExpiry')?.value;
    const maxUses = Number(document.getElementById('newCouponMaxUses')?.value) || null;
    if (!code) { showCouponMsg('Enter a coupon code.', 'error'); return; }
    if (!pct || pct <= 0 || pct > 100) { showCouponMsg('Enter a valid discount % (1-100).', 'error'); return; }
    try {
      const data = { discountPercent: pct, active: true, usedCount: 0, createdAt: serverTimestamp() };
      if (expVal)   data.expiresAt = Timestamp.fromDate(new Date(expVal));
      if (maxUses)  data.maxUses   = maxUses;
      await setDoc(doc(db, 'coupons', code), data);
      showCouponMsg('Coupon created: ' + code, 'success');
      document.getElementById('newCouponCode').value     = '';
      document.getElementById('newCouponDiscount').value = '';
      document.getElementById('newCouponExpiry').value   = '';
      document.getElementById('newCouponMaxUses').value  = '';
    } catch(e) { showCouponMsg('Error: ' + e.message, 'error'); }
  };

  function showCouponMsg(text, type) {
    const msg = document.getElementById('couponCreateMsg');
    if (!msg) return;
    msg.textContent = text;
    msg.className = 'coupon-msg ' + type;
  }

  window.adminToggleCoupon = async function(code, isActive) {
    await updateDoc(doc(db, 'coupons', code), { active: !isActive });
  };

  window.adminDeleteCoupon = async function(code) {
    if (!confirm('Delete coupon ' + code + '?')) return;
    const { deleteDoc } = await import('https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js');
    await deleteDoc(doc(db, 'coupons', code));
  };

  /* ── Support Chat ── */
  function loadSupportRooms() {
    const roomsEl = document.getElementById('adminChatRooms');
    if (!roomsEl) return;
    onSnapshot(query(collection(db, 'supportRooms'), orderBy('lastAt', 'desc')), (snap) => {
      roomsEl.innerHTML = '';
      const badge = document.getElementById('badgeSupport');
      const openCount = snap.docs.filter(d => d.data().status !== 'solved').length;
      if (badge) { badge.textContent = openCount || ''; badge.style.display = openCount ? 'flex' : 'none'; }
      if (snap.empty) {
        roomsEl.innerHTML = '<div style="padding:18px;color:#4a6070;font-size:.84rem;text-align:center;">কোনো support ticket নেই।</div>';
        return;
      }
      snap.forEach(docSnap => {
        const d = docSnap.data();
        const uid = docSnap.id;
        const isSolved = d.status === 'solved';
        const el = document.createElement('div');
        el.className = 'inbox-item' + (activeChatUid === uid ? ' active' : '');
        el.innerHTML = `
          <div class="inbox-item-left">
            <div class="inbox-item-name">
              <span class="inbox-status-dot ${isSolved?'solved':'open'}"></span>
              ${escHtml(d.displayName || d.userEmail || 'User')}
            </div>
            ${d.ticketId ? `<div class="inbox-item-ticket">#${escHtml(d.ticketId)}</div>` : ''}
            <div class="inbox-item-preview" style="font-size:.73rem;color:#5a7a9a;">📧 ${escHtml(d.userEmail||'—')} &nbsp;|&nbsp; 📞 ${escHtml(d.userPhone||'—')}</div>
            <div class="inbox-item-preview">${escHtml(d.lastMessage || '')}</div>
          </div>
          <div class="inbox-item-right">
            ${(d.unreadAdmin && !isSolved) ? `<span class="inbox-unread-badge">${d.unreadAdmin}</span>` : ''}
            <span class="inbox-status-label ${isSolved?'solved':'open'}">${isSolved?'Solved':'Open'}</span>
          </div>`;
        el.addEventListener('click', () => {
          document.querySelectorAll('.inbox-item').forEach(r => r.classList.remove('active'));
          el.classList.add('active');
          openAdminChat(uid, d);
        });
        roomsEl.appendChild(el);
      });
    });
  }

  function openAdminChat(uid, roomData) {
    activeChatUid = uid;
    const chatWin = document.getElementById('adminChatWindow');
    const msgsEl  = document.getElementById('adminChatMsgs');
    if (!chatWin || !msgsEl) return;

    // Populate header
    document.getElementById('adminChatUserName').textContent = roomData?.displayName || roomData?.userEmail || 'User';
    document.getElementById('adminChatTicketId').textContent = roomData?.ticketId ? '#' + roomData.ticketId : '';
    document.getElementById('adminChatUserEmail').textContent = roomData?.userEmail || '—';
    document.getElementById('adminChatUserPhone').textContent = roomData?.userPhone || '—';
    // Complaint: get from first user message in supportChats if not in roomData
    const complaintEl = document.getElementById('adminChatUserComplaint');
    complaintEl.textContent = roomData?.lastMessage || '—';

    chatWin.style.display = 'block';
    msgsEl.innerHTML = '';

    // Clear unread
    updateDoc(doc(db, 'supportRooms', uid), { unreadAdmin: 0 }).catch(() => {});

    if (unsubChatMsgs) unsubChatMsgs();
    const q = query(collection(db, 'supportChats', uid, 'messages'), orderBy('createdAt', 'asc'));
    unsubChatMsgs = onSnapshot(q, snap => {
      snap.docChanges().forEach(change => {
        if (change.type !== 'added') return;
        const d = change.doc.data();
        if (d.role === 'system') return; // skip system messages
        const isAdm = d.role === 'admin';
        const wrap = document.createElement('div');
        wrap.className = isAdm ? 'chat-msg-admin' : 'chat-msg-user';
        const time = d.createdAt?.toDate ? d.createdAt.toDate().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
        wrap.innerHTML = `<div class="chat-msg-bubble">${escHtml(d.text)}</div><div class="chat-msg-time">${time}</div>`;
        msgsEl.appendChild(wrap);
        msgsEl.scrollTop = msgsEl.scrollHeight;
      });
    });
    // Scroll chat into view
    chatWin.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  window.adminCloseChat = function() {
    if (unsubChatMsgs) { unsubChatMsgs(); unsubChatMsgs = null; }
    const chatWin = document.getElementById('adminChatWindow');
    if (chatWin) chatWin.style.display = 'none';
    document.querySelectorAll('.inbox-item').forEach(r => r.classList.remove('active'));
    activeChatUid = null;
  };

  window.adminSendReply = async function() {
    if (!activeChatUid || !adminUser) return;
    const inp  = document.getElementById('adminReplyInput');
    const text = inp?.value.trim();
    if (!text) return;
    inp.value = '';
    await addDoc(collection(db, 'supportChats', activeChatUid, 'messages'), {
      text, role: 'admin', adminEmail: adminUser.email, createdAt: serverTimestamp()
    });
    await updateDoc(doc(db, 'supportRooms', activeChatUid), {
      lastMessage: text, lastAt: serverTimestamp()
    }).catch(() => {});
  };

  window.adminMarkSolved = async function() {
    if (!activeChatUid || !adminUser) return;
    if (!confirm('এই সাপোর্ট টিকেট Solved মার্ক করবেন?')) return;
    const uid = activeChatUid;

    // Send system solved signal so user widget detects it
    await addDoc(collection(db, 'supportChats', uid, 'messages'), {
      text: 'আপনার সমস্যাটি সমাধান হয়েছে।',
      role: 'system', type: 'solved',
      adminEmail: adminUser.email,
      createdAt: serverTimestamp(),
    });

    // Update room status
    await updateDoc(doc(db, 'supportRooms', uid), { status: 'solved', lastAt: serverTimestamp() }).catch(() => {});

    // Update ticket doc
    const roomSnap = await getDoc(doc(db, 'supportRooms', uid)).catch(() => null);
    const ticketId = roomSnap?.data()?.ticketId;
    if (ticketId) {
      await updateDoc(doc(db, 'supportTickets', ticketId), { status: 'solved', updatedAt: serverTimestamp() }).catch(() => {});
    }

    // Close chat panel
    adminCloseChat();
  };

  document.getElementById('adminReplyInput')?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); window.adminSendReply(); }
  });
  </script>

</body>
</html>
