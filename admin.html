<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel | Rabbi Hossain LTD</title>
  <meta name="description" content="Admin panel for manual credit approval." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .admin-page { min-height:100vh; padding:130px 20px 70px; background: radial-gradient(circle at top, rgba(0,255,136,0.10), transparent 34%), #02050a; }
    .admin-wrap { max-width:920px; margin:0 auto; }
    .admin-head, .admin-card, .empty-state { background:rgba(255,255,255,0.055); border:1px solid rgba(0,200,255,0.16); border-radius:24px; padding:24px; box-shadow:0 28px 80px rgba(0,0,0,0.42); backdrop-filter:blur(16px); }
    .admin-head { margin-bottom:18px; display:flex; justify-content:space-between; gap:16px; align-items:center; flex-wrap:wrap; }
    .admin-title { font-size:clamp(2rem,5vw,3.2rem); color:#e8edf5; margin-bottom:8px; }
    .admin-sub, #adminInfo { color:#7a8ca8; line-height:1.65; }
    .admin-list { display:grid; gap:14px; }
    .admin-card h3 { color:#00ff88; font-size:1.7rem; margin:0; }
    .admin-card p { color:#c9d4e5; margin:8px 0; word-break:break-word; }
    .admin-card-head { display:flex; justify-content:space-between; gap:12px; align-items:center; margin-bottom:12px; }
    .actions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:18px; }
    .actions button, .admin-link { border:0; border-radius:999px; padding:13px 16px; font-weight:800; cursor:pointer; text-decoration:none; text-align:center; display:inline-block; }
    .confirm { background:linear-gradient(135deg,#00c8ff,#00ff88); color:#02050a; }
    .decline { background:rgba(255,80,80,0.16); color:#ffb0b0; border:1px solid rgba(255,80,80,0.28) !important; }
    .admin-link { background:rgba(255,255,255,0.06); color:#e8edf5; border:1px solid rgba(255,255,255,0.1); }
    .status { padding:5px 10px; border-radius:999px; font-size:0.74rem; text-transform:uppercase; font-weight:800; }
    .status.pending { color:#ffe7a3; background:rgba(255,200,80,0.12); }
    .empty-state { color:#7a8ca8; text-align:center; }
    .admin-denied { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#02050a; color:#e8edf5; text-align:center; padding:20px; }
    .admin-denied div { max-width:420px; background:rgba(255,255,255,.06); border:1px solid rgba(255,80,80,.25); border-radius:24px; padding:34px; }
    .admin-denied a { color:#00c8ff; text-decoration:none; font-weight:700; }
    @media(max-width:640px) { .actions { grid-template-columns:1fr; } .admin-page { padding-top:110px; } }
  </style>
</head>
<body onload="loadAdminPanel()">

  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">Rabbi Hossain</a>
      <button class="nav-hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false" aria-controls="navLinks">
        <span></span><span></span><span></span>
      </button>
      <ul class="nav-links" id="navLinks" role="list">
        <li><a href="index.html">Home</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="portfolio.html">Portfolio</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <a href="mailto:info@rabbihossainltd.online" class="nav-cta">Hire Me</a>
    </div>
  </nav>

  <main class="admin-page">
    <section class="admin-wrap">
      <div class="admin-head">
        <div>
          <h1 class="admin-title">Admin Panel</h1>
          <p class="admin-sub">Pending manual payment requests confirm/decline করার জায়গা।</p>
          <p id="adminInfo">Checking admin access...</p>
        </div>
        <a class="admin-link" href="add-credit.html">Add Credit Page</a>
      </div>

      <div id="adminTopupList" class="admin-list">
        <div class="empty-state">Loading payment requests...</div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script type="module" src="js/wallet.js"></script>
</body>
</html>
