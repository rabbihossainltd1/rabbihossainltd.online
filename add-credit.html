<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    (function(){
      try{
        var u=JSON.parse(localStorage.getItem('rh_user_cache')||'null');
        if(!u||!u.uid) return;
        var s=document.createElement('style');
        s.id='rh-instant-auth';
        s.textContent='#navLoginBtn{display:none!important}#navUserAvatar{display:flex!important}';
        document.head.appendChild(s);
      }catch(e){}
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Credit | Rabbi Hossain LTD</title>
  <meta name="description" content="Secure payment page for wallet credit." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="dns-prefetch" href="//firestore.googleapis.com" />
  <link rel="dns-prefetch" href="//identitytoolkit.googleapis.com" />
  <link rel="preload" href="css/style.min.css" as="style" />
  <link rel="stylesheet" href="css/style.min.css" />

  <style>
    :root{
      --bkash:#E2136E;--nagad:#F05A28;--rocket:#8B2FC9;--binance:#F3BA2F;
      --pay-bg:#040608;
      --pay-text:#eef2ff;--pay-muted:#7a8fb5;
      --pay-success:#00e87a;--pay-accent:#4f8fff;--pay-accent-2:#00c8ff;
      --font-display:'Outfit',sans-serif;--font-body:'Manrope',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font-body);background:var(--pay-bg);color:var(--pay-text);min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 10% -10%,rgba(79,143,255,.14) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 90% 10%,rgba(0,232,122,.09) 0%,transparent 55%),radial-gradient(ellipse 50% 70% at 50% 100%,rgba(79,143,255,.06) 0%,transparent 60%);pointer-events:none;}
    body::after{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:52px 52px;mask-image:radial-gradient(ellipse 100% 80% at 50% 0%,black 0%,transparent 70%);pointer-events:none;}

    .payment-page{min-height:100vh;padding:100px 20px 160px;position:relative;z-index:1;}
    .payment-shell{width:min(560px,100%);margin:0 auto;}

    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
    @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

    /* Auth required */
    #authRequired{background:rgba(12,16,28,.85);border:1px solid rgba(255,255,255,.07);border-radius:28px;box-shadow:0 40px 100px rgba(0,0,0,.5);backdrop-filter:blur(24px);padding:40px;text-align:center;display:none;animation:fadeUp .7s ease both;}
    #authRequired h1{font-family:var(--font-display);font-size:2.2rem;margin-bottom:12px;}
    #authRequired p{color:var(--pay-muted);line-height:1.7;margin-bottom:24px;}

    /* Main card */
    .payment-card{background:rgba(12,16,28,.85);border:1px solid rgba(255,255,255,.07);border-radius:28px;box-shadow:0 0 0 1px rgba(255,255,255,.03) inset,0 40px 100px rgba(0,0,0,.5);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);overflow:hidden;animation:fadeUp .6s ease both;}
    .payment-card-inner{padding:26px;position:relative;}

    /* Step system */
    .step-screen{display:none;animation:fadeUp .3s ease both;}
    .step-screen.active{display:block;}

    /* Back button — arrow only, no text beside it */
    .back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:none;color:var(--pay-muted);cursor:pointer;font-family:var(--font-body);font-weight:700;font-size:.84rem;padding:0;margin-bottom:22px;transition:color .18s;}
    .back-btn:hover{color:var(--pay-text);}
    .back-btn svg{width:18px;height:18px;}

    .section-label{font-size:.66rem;font-weight:700;letter-spacing:.14em;color:var(--pay-muted);text-transform:uppercase;margin:0 0 16px;}

    /* ── STEP 1: Amount input ── */
    .amount-input-box{margin-bottom:20px;}
    .amount-input-box label{display:block;color:#bcc8e0;font-weight:700;margin-bottom:10px;font-size:.86rem;}
    .amount-input-row{display:flex;align-items:center;gap:0;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:18px;overflow:hidden;transition:border-color .18s,box-shadow .18s;}
    .amount-input-row:focus-within{border-color:rgba(79,143,255,.5);box-shadow:0 0 0 3px rgba(79,143,255,.1);}
    .amount-prefix{padding:0 14px;color:var(--pay-success);font-family:var(--font-display);font-size:1.3rem;font-weight:900;flex-shrink:0;}
    .amount-input-row input{flex:1;min-height:56px;background:transparent;border:none;outline:none;color:var(--pay-text);font-size:1.1rem;font-weight:800;font-family:var(--font-display);padding:13px 0;}
    .amount-input-row input::placeholder{color:rgba(122,143,181,.5);font-weight:600;font-size:.95rem;}
    .amount-bdt-badge{padding:0 16px;color:var(--pay-muted);font-size:.82rem;font-weight:700;flex-shrink:0;white-space:nowrap;}
    .amount-bdt-hint{margin-top:7px;padding:0 4px;color:rgba(138,162,201,.65);font-size:.78rem;font-weight:600;min-height:1.1em;letter-spacing:.01em;transition:color .2s;}

    /* ── Category buttons ── */
    .category-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .category-btn{border:1px solid rgba(255,255,255,.08);border-radius:20px;background:rgba(255,255,255,.03);padding:26px 14px 20px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--pay-text);transition:all .25s cubic-bezier(.34,1.56,.64,1);width:100%;}
    .category-btn:hover{transform:translateY(-4px) scale(1.02);}
    .category-btn.mobile:hover{border-color:rgba(0,232,122,.4);background:rgba(0,232,122,.06);box-shadow:0 16px 40px rgba(0,232,122,.1);}
    .category-btn.crypto:hover{border-color:rgba(243,186,47,.4);background:rgba(243,186,47,.06);box-shadow:0 16px 40px rgba(243,186,47,.1);}
    .category-icon{width:60px;height:60px;border-radius:16px;overflow:hidden;background:rgba(255,255,255,.95);padding:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.3);}
    .category-icon img{width:100%;height:100%;object-fit:contain;}
    .category-label{font-family:var(--font-display);font-size:.95rem;font-weight:800;}
    .category-sub{font-size:.71rem;color:var(--pay-muted);text-align:center;line-height:1.5;}

    /* ── Sub-option (bKash/Nagad/Rocket | Binance/Coin) ── */
    .suboption-grid{display:grid;gap:12px;}
    .suboption-grid.col-3{grid-template-columns:repeat(3,1fr);}
    .suboption-grid.col-2{grid-template-columns:repeat(2,1fr);}
    .suboption-btn{border:1px solid rgba(255,255,255,.08);border-radius:18px;background:rgba(255,255,255,.03);padding:20px 10px 16px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:9px;color:var(--pay-text);transition:all .22s cubic-bezier(.34,1.56,.64,1);width:100%;}
    .suboption-btn:hover{transform:translateY(-3px) scale(1.03);}
    .suboption-btn.bkash:hover{border-color:rgba(226,19,110,.5);background:rgba(226,19,110,.09);box-shadow:0 10px 30px rgba(226,19,110,.15);}
    .suboption-btn.nagad:hover{border-color:rgba(240,90,40,.5);background:rgba(240,90,40,.09);box-shadow:0 10px 30px rgba(240,90,40,.15);}
    .suboption-btn.rocket:hover{border-color:rgba(139,47,201,.5);background:rgba(139,47,201,.09);box-shadow:0 10px 30px rgba(139,47,201,.15);}
    .suboption-btn.binance:hover{border-color:rgba(243,186,47,.5);background:rgba(243,186,47,.08);box-shadow:0 10px 30px rgba(243,186,47,.12);}
    .suboption-btn.coin:hover{border-color:rgba(79,143,255,.5);background:rgba(79,143,255,.08);box-shadow:0 10px 30px rgba(79,143,255,.12);}
    .suboption-icon{width:50px;height:50px;border-radius:14px;overflow:hidden;background:rgba(255,255,255,.97);padding:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.25);}
    .suboption-icon img{width:100%;height:100%;object-fit:contain;}
    .suboption-name{font-weight:800;font-size:.88rem;}
    .suboption-tag{color:var(--pay-muted);font-size:.66rem;}

    /* ── Coin grid ── */
    .coin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px;}
    .coin-btn{border:1px solid rgba(255,255,255,.08);border-radius:14px;background:rgba(255,255,255,.03);padding:14px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--pay-text);transition:all .22s cubic-bezier(.34,1.56,.64,1);width:100%;}
    .coin-btn:hover{border-color:rgba(79,143,255,.45);background:rgba(79,143,255,.08);transform:translateY(-3px);box-shadow:0 10px 28px rgba(79,143,255,.12);}
    .coin-icon{width:40px;height:40px;border-radius:11px;overflow:hidden;background:rgba(255,255,255,.97);padding:5px;box-shadow:0 3px 10px rgba(0,0,0,.25);}
    .coin-icon img{width:100%;height:100%;object-fit:contain;}
    .coin-name{font-weight:800;font-size:.75rem;text-align:center;}
    .coin-chain{font-size:.6rem;color:var(--pay-muted);font-weight:600;text-align:center;}

    /* ── Mobile payment panel (themed) ── */
    .pay-panel{border-radius:20px;padding:20px;margin-bottom:18px;}
    .pay-panel.bkash-theme{background:rgba(226,19,110,.07);border:1px solid rgba(226,19,110,.2);}
    .pay-panel.nagad-theme{background:rgba(240,90,40,.07);border:1px solid rgba(240,90,40,.2);}
    .pay-panel.rocket-theme{background:rgba(139,47,201,.07);border:1px solid rgba(139,47,201,.2);}

    .pay-panel-header{display:flex;align-items:center;gap:11px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.06);}
    .pay-panel-logo{width:42px;height:42px;border-radius:12px;overflow:hidden;background:#fff;padding:6px;box-shadow:0 4px 12px rgba(0,0,0,.3);flex-shrink:0;}
    .pay-panel-logo img{width:100%;height:100%;object-fit:contain;}
    .pay-panel-title{font-family:var(--font-display);font-weight:800;font-size:.95rem;}
    .pay-panel-sub{font-size:.72rem;color:var(--pay-muted);margin-top:2px;}

    /* Step rows inside panel */
    .pay-step-list{display:flex;flex-direction:column;gap:0;}
    .pay-step-row{display:flex;gap:11px;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.84rem;color:#c8d4ee;line-height:1.65;}
    .pay-step-row:last-child{border-bottom:none;}
    .pay-step-num{width:22px;height:22px;flex-shrink:0;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.7rem;font-family:var(--font-display);margin-top:2px;}
    .bkash-theme .pay-step-num{background:rgba(226,19,110,.15);color:#ff6699;}
    .nagad-theme .pay-step-num{background:rgba(240,90,40,.15);color:#ff9966;}
    .rocket-theme .pay-step-num{background:rgba(139,47,201,.15);color:#cc88ff;}

    /* Inline copy row inside step — wallet number & amount */
    .inline-copy-row{display:flex;align-items:center;gap:7px;margin-top:4px;}
    .inline-val{font-weight:900;font-size:1rem;letter-spacing:.01em;}
    .bkash-theme .inline-val{color:#ff6699;}
    .nagad-theme .inline-val{color:#ff9966;}
    .rocket-theme .inline-val{color:#cc88ff;}
    .inline-copy-btn{display:inline-flex;align-items:center;justify-content:center;background:none;border:none;cursor:pointer;color:var(--pay-muted);padding:4px;border-radius:7px;transition:color .16s,background .16s;flex-shrink:0;}
    .inline-copy-btn svg{width:15px;height:15px;}
    .inline-copy-btn:hover,.inline-copy-btn.copied{color:var(--pay-success);}

    /* Transaction field & submit */
    .pay-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);margin:18px 0;}
    .pay-field{margin-bottom:14px;}
    .pay-field label{display:block;color:#bcc8e0;font-weight:700;margin-bottom:8px;font-size:.83rem;}
    .pay-field input{width:100%;min-height:52px;border-radius:15px;border:1px solid rgba(255,255,255,.09);background:rgba(0,0,0,.3);color:var(--pay-text);outline:none;padding:13px 16px;font-size:.95rem;font-weight:700;font-family:var(--font-body);letter-spacing:.04em;transition:border-color .18s,box-shadow .18s;}
    .pay-field input:focus{border-color:rgba(79,143,255,.5);box-shadow:0 0 0 3px rgba(79,143,255,.1);}

    .submit-btn{width:100%;border:none;border-radius:15px;padding:17px 20px;cursor:pointer;color:#02050a;background:linear-gradient(135deg,var(--pay-accent),var(--pay-accent-2),var(--pay-success));background-size:200% 200%;font-weight:900;font-size:.96rem;font-family:var(--font-display);letter-spacing:.01em;display:inline-flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 10px 40px rgba(79,143,255,.25);transition:all .24s;animation:gradientShift 4s ease infinite;margin-bottom:10px;}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 16px 50px rgba(79,143,255,.3);}
    .submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;animation:none;box-shadow:none;}
    .submit-btn svg{width:17px;height:17px;}

    .wallet-message{display:none;padding:12px 15px;border-radius:13px;font-size:.88rem;line-height:1.6;font-weight:500;margin-bottom:13px;}
    .wallet-message.success{display:block;color:#a0ffcf;background:rgba(0,232,122,.07);border:1px solid rgba(0,232,122,.2);}
    .wallet-message.error{display:block;color:#ffb0b0;background:rgba(255,80,80,.07);border:1px solid rgba(255,80,80,.2);}

    /* ── Binance panel ── */
    .binance-amount-note{background:rgba(243,186,47,.06);border:1px solid rgba(243,186,47,.16);border-radius:13px;padding:11px 15px;margin-bottom:15px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .binance-amount-note span{color:rgba(201,162,39,.85);font-size:.78rem;}
    .binance-amount-note strong{color:#f3ba2f;font-family:var(--font-display);font-size:.98rem;}
    .binance-qr-box{background:rgba(243,186,47,.04);border:1px solid rgba(243,186,47,.16);border-radius:20px;padding:22px;margin-bottom:18px;text-align:center;}
    .binance-qr-title{color:#f3ba2f;font-weight:800;font-size:.78rem;letter-spacing:.06em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:7px;justify-content:center;}
    .binance-qr-wrap{width:170px;height:170px;margin:0 auto 16px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 36px rgba(0,0,0,.35),0 0 0 1px rgba(243,186,47,.14);}
    .binance-qr-wrap img{width:152px;height:152px;object-fit:contain;border-radius:10px;}
    .wallet-id-row{background:rgba(0,0,0,.22);border:1px solid rgba(243,186,47,.14);border-radius:13px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:13px;text-align:left;}
    .wallet-id-label{color:rgba(138,112,64,.85);font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
    .wallet-id-val{color:#f3ba2f;font-weight:800;font-size:.96rem;font-family:var(--font-display);}
    .copy-btn-sm{display:inline-flex;align-items:center;justify-content:center;background:none;border:1px solid rgba(255,255,255,.09);border-radius:10px;width:34px;height:34px;cursor:pointer;color:var(--pay-muted);transition:all .16s;flex-shrink:0;}
    .copy-btn-sm svg{width:14px;height:14px;}
    .copy-btn-sm:hover,.copy-btn-sm.copied{color:var(--pay-success);border-color:rgba(0,232,122,.3);background:rgba(0,232,122,.07);}
    .binance-open-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:14px;border-radius:13px;background:linear-gradient(135deg,#f3ba2f,#e8a410);color:#1a0c00;font-weight:900;font-size:.88rem;font-family:var(--font-display);text-decoration:none;box-shadow:0 8px 28px rgba(243,186,47,.2);margin-bottom:11px;transition:all .2s;}
    .binance-open-btn:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(243,186,47,.3);}
    .binance-hint{color:rgba(138,112,64,.65);font-size:.72rem;margin-bottom:16px;}
    .instr-box{border-radius:13px;padding:13px 15px;margin-bottom:16px;text-align:left;}
    .instr-box.gold{background:rgba(243,186,47,.04);border:1px solid rgba(243,186,47,.12);}
    .instr-box.blue{background:rgba(79,143,255,.04);border:1px solid rgba(79,143,255,.12);}
    .instr-title{font-weight:800;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px;}
    .instr-title.gold{color:#f3ba2f;}
    .instr-title.blue{color:var(--pay-accent);}
    .instr-step{display:flex;gap:9px;align-items:flex-start;font-size:.82rem;line-height:1.55;margin-bottom:7px;}
    .instr-step:last-child{margin-bottom:0;}
    .instr-step.gold{color:#c9a227;}
    .instr-step.blue{color:#c9d6ef;}
    .step-num-badge{font-weight:800;width:20px;height:20px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;font-family:var(--font-display);}
    .step-num-badge.gold{background:rgba(243,186,47,.15);color:#f3ba2f;}
    .step-num-badge.blue{background:rgba(79,143,255,.15);color:var(--pay-accent);}

    /* ── Crypto coin panel ── */
    .crypto-pay-box{background:rgba(79,143,255,.04);border:1px solid rgba(79,143,255,.16);border-radius:20px;padding:22px;margin-bottom:18px;text-align:center;}
    .crypto-header{display:flex;align-items:center;gap:11px;margin-bottom:18px;justify-content:center;}
    .crypto-logo{width:44px;height:44px;border-radius:13px;overflow:hidden;background:#fff;padding:5px;box-shadow:0 4px 12px rgba(0,0,0,.25);}
    .crypto-logo img{width:100%;height:100%;object-fit:contain;}
    .crypto-name-label{font-family:var(--font-display);font-size:1.05rem;font-weight:800;}
    .crypto-chain-label{font-size:.72rem;color:var(--pay-muted);}
    .crypto-qr-wrap{width:170px;height:170px;margin:0 auto 16px;border-radius:16px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 36px rgba(0,0,0,.35),0 0 0 1px rgba(79,143,255,.14);}
    .crypto-qr-wrap img{width:152px;height:152px;object-fit:contain;border-radius:10px;}
    .address-row{background:rgba(0,0,0,.22);border:1px solid rgba(79,143,255,.14);border-radius:13px;padding:12px 15px;display:flex;align-items:center;justify-content:space-between;gap:12px;text-align:left;}
    .address-label{color:var(--pay-muted);font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;}
    .address-val{color:var(--pay-accent-2);font-weight:800;font-size:.8rem;font-family:var(--font-display);word-break:break-all;}
    .coin-amount-note{background:rgba(0,232,122,.05);border:1px solid rgba(0,232,122,.14);border-radius:13px;padding:11px 15px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .coin-amount-note span{color:var(--pay-muted);font-size:.78rem;}
    .coin-amount-note strong{color:var(--pay-success);font-family:var(--font-display);font-size:.98rem;}

    /* ── Full-screen verifying overlay ── */
    .verify-overlay{position:fixed;inset:0;z-index:9999;background:rgba(4,6,8,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;animation:fadeUp .3s ease both;}
    .verify-spinner{width:72px;height:72px;border-radius:50%;border:3px solid rgba(79,143,255,.15);border-top-color:var(--pay-accent);border-right-color:var(--pay-accent-2);animation:spin 1s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .verify-pulse-ring{position:absolute;width:100px;height:100px;border-radius:50%;border:1px solid rgba(0,232,122,.2);animation:ringPulse 2s ease infinite;}
    @keyframes ringPulse{0%{transform:scale(.8);opacity:.8}100%{transform:scale(1.6);opacity:0}}
    .verify-spinner-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:100px;height:100px;}
    .verify-title{font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:var(--pay-text);}
    .verify-sub{color:var(--pay-muted);font-size:.88rem;text-align:center;max-width:280px;line-height:1.7;}
    .verify-eta{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:30px;background:rgba(79,143,255,.08);border:1px solid rgba(79,143,255,.18);color:rgba(130,160,210,.75);font-size:.76rem;font-weight:700;letter-spacing:.04em;}
    .verify-eta svg{width:13px;height:13px;flex-shrink:0;}
    .verify-orders-btn{margin-top:4px;display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:14px;background:rgba(79,143,255,.12);border:1px solid rgba(79,143,255,.3);color:var(--pay-accent);font-weight:800;font-size:.88rem;font-family:var(--font-display);text-decoration:none;transition:all .2s;}
    .verify-orders-btn:hover{background:rgba(79,143,255,.2);transform:translateY(-1px);}
    .verify-orders-btn svg{width:15px;height:15px;}
    /* Green approved tick */
    .verify-tick-wrap{position:relative;display:flex;align-items:center;justify-content:center;width:100px;height:100px;}
    .verify-tick-ring{position:absolute;width:100px;height:100px;border-radius:50%;border:2px solid rgba(0,232,122,.35);animation:ringPulse 2s ease infinite;}
    .verify-tick-circle{width:72px;height:72px;border-radius:50%;background:rgba(0,232,122,.12);border:2.5px solid #00e87a;display:flex;align-items:center;justify-content:center;animation:tickPop .5s cubic-bezier(.34,1.56,.64,1) both;}
    @keyframes tickPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
    .verify-tick-svg{width:36px;height:36px;stroke:#00e87a;stroke-width:2.8;stroke-linecap:round;stroke-linejoin:round;fill:none;stroke-dasharray:40;stroke-dashoffset:40;animation:drawTick .5s .3s ease forwards;}

    .verify-approved-title{font-family:var(--font-display);font-size:1.5rem;font-weight:900;color:#00e87a;}

  <script>
    const USD_TO_BDT = 125;
    let selectedUsdAmount = 0;

    const PAYMENT_NUMBERS = { bKash:'01349407692', Nagad:'01731410341', Rocket:'01731410341' };
    const MOBILE_INFO = {
      bKash: { theme:'bkash-theme', name:'bKash', dial:'*247#', icon:'images/bkash.png', hlClass:'highlight-bkash' },
      Nagad: { theme:'nagad-theme', name:'Nagad', dial:'*167#', icon:'images/nagad.png', hlClass:'highlight-nagad' },
      Rocket:{ theme:'rocket-theme', name:'Rocket', dial:'*322#', icon:'images/rocket.png', hlClass:'highlight-rocket' }
    };

    const copySvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;

    function fmtUsd(n){ return '$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:2}); }
    function fmtBdt(n){ return '৳'+Math.round(n).toLocaleString('en-BD'); }

    function onAmountInput(){
      const v = parseFloat(document.getElementById('amountInput').value)||0;
      selectedUsdAmount = v;
      const bdt = Math.round(v * USD_TO_BDT);
      document.getElementById('bdtBadge').textContent = v > 0 ? `≈ ${fmtBdt(bdt)} BDT` : '≈ ৳ 0 BDT';
      document.getElementById('selectedUsd').value = v;
      document.getElementById('selectedBdt').value = bdt;
    }

    function showStep(id){
      const loader = document.getElementById('stepLoadingOverlay');
      if(loader){ loader.classList.add('active'); }
      setTimeout(()=>{
        document.querySelectorAll('.step-screen').forEach(s=>s.classList.remove('active'));
        const el = document.getElementById('step'+id);
        if(el) el.classList.add('active');
        if(loader){ loader.classList.remove('active'); }
      }, 500);
    }

    function goToStep2(){
      if(!selectedUsdAmount||selectedUsdAmount<1){ alert('Minimum $1 amount দিন।'); return; }
      showStep(2);
    }

    function goToMobilePayment(method){
      const info = MOBILE_INFO[method];
      const usd = selectedUsdAmount;
      const bdt = Math.round(usd * USD_TO_BDT);
      const num = PAYMENT_NUMBERS[method];
      document.getElementById('paymentMethod').value = method;

      // Build panel — inline copy buttons inside step rows, no separate info-row section
      document.getElementById('dynamicPayPanel').innerHTML = `
        <div class="pay-panel ${info.theme}">
          <div class="pay-panel-header">
            <div class="pay-panel-logo"><img src="${info.icon}" alt="${info.name}" /></div>
            <div>
              <div class="pay-panel-title">${info.name} দিয়ে পেমেন্ট করুন</div>
              <div class="pay-panel-sub">নিচের নির্দেশনা অনুসরণ করুন</div>
            </div>
          </div>
          <div class="pay-step-list">
            <div class="pay-step-row">
              <div class="pay-step-num">1</div>
              <div><span style="font-weight:800;">${info.dial}</span> ডায়াল করুন অথবা <strong>${info.name} App</strong> খুলুন</div>
            </div>
            <div class="pay-step-row">
              <div class="pay-step-num">2</div>
              <div><span style="font-weight:800;">"Send Money"</span> তে ক্লিক করুন</div>
            </div>
            <div class="pay-step-row">
              <div class="pay-step-num">3</div>
              <div>
                প্রাপক নম্বর হিসেবে এই নম্বরটি লিখুন
                <div class="inline-copy-row">
                  <span class="inline-val" id="mobileNum_${method}">${num}</span>
                  <button type="button" class="inline-copy-btn" onclick="doCopyInline('mobileNum_${method}',this)">${copySvg}</button>
                </div>
              </div>
            </div>
            <div class="pay-step-row">
              <div class="pay-step-num">4</div>
              <div>
                টাকার পরিমাণ
                <div class="inline-copy-row">
                  <span class="inline-val" id="mobileBdt_${method}">${fmtBdt(bdt)}</span>
                  <button type="button" class="inline-copy-btn" onclick="doCopyBdtInline('mobileBdt_${method}',this)">${copySvg}</button>
                </div>
              </div>
            </div>
            <div class="pay-step-row">
              <div class="pay-step-num">5</div>
              <div>${info.name} মোবাইল মেনু PIN লিখুন। সবকিছু ঠিক থাকলে ${info.name} থেকে একটি নিশ্চিতকরণ বার্তা পাবেন।</div>
            </div>
            <div class="pay-step-row">
              <div class="pay-step-num">6</div>
              <div>এখন উপরের বক্সে আপনার <strong>Transaction ID</strong> দিন এবং নিচের <strong>VERIFY</strong> বাটনে ক্লিক করুন।</div>
            </div>
          </div>
        </div>`;

      const msg = document.getElementById('walletMessage');
      if(msg){ msg.className='wallet-message'; msg.style.display='none'; }
      const tx = document.getElementById('transactionId');
      if(tx) tx.value='';
      showStep('4mobile');
    }

    function goToBinance(){
      const usd = selectedUsdAmount;
      document.getElementById('binanceAmtNote').textContent = fmtUsd(usd);
      const msg = document.getElementById('walletMessageBinance');
      if(msg){ msg.className='wallet-message'; msg.style.display='none'; }
      const tx = document.getElementById('transactionIdBinance');
      if(tx) tx.value='';
      showStep('4binance');
    }

    function goToCoin(name, chainLabel, imgFile, qrFile, address){
      document.getElementById('paymentMethodCoin').value = name;
      document.getElementById('coinDisplayName').textContent = name;
      document.getElementById('coinDisplayChain').textContent = chainLabel;
      document.getElementById('coinLogoImg').src = 'images/'+imgFile;
      document.getElementById('coinQrImg').src = 'images/'+qrFile;
      document.getElementById('coinAddress').textContent = address;
      document.getElementById('coinAmtDisplay').textContent = fmtUsd(selectedUsdAmount);
      document.getElementById('coinNetworkWarn').textContent = chainLabel;
      const msg = document.getElementById('walletMessageCoin');
      if(msg){ msg.className='wallet-message'; msg.style.display='none'; }
      const tx = document.getElementById('transactionIdCoin');
      if(tx) tx.value='';
      showStep('5coin');
    }

    function doCopy(id, btn){
      const el = document.getElementById(id);
      if(!el) return;
      _copyText(el.textContent.trim(), btn);
    }

    function doCopyInline(id, btn){
      const el = document.getElementById(id);
      if(!el) return;
      _copyText(el.textContent.trim(), btn);
    }

    function doCopyBdtInline(id, btn){
      const el = document.getElementById(id);
      if(!el) return;
      const raw = el.textContent.replace(/[৳,\s]/g,'').trim();
      _copyText(raw, btn);
    }

    function _copyText(text, btn){
      const flash = ()=>{ if(btn){ btn.classList.add('copied'); setTimeout(()=>btn.classList.remove('copied'),1800); } };
      if(navigator.clipboard){ navigator.clipboard.writeText(text).then(flash); }
      else{ const t=document.createElement('textarea');t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);flash(); }
    }

    function showMsg(elId, text, type){
      const el = document.getElementById(elId);
      if(!el) return;
      el.textContent = text;
      el.className = `wallet-message ${type}`;
      el.style.display = 'block';
    }

    // ── Full-screen verifying overlay ──
    window.showVerifyingOverlay = function showVerifyingOverlay(topupDocId){
      // Remove any old overlay
      const old = document.getElementById('verifyOverlay');
      if (old) old.remove();

      const ov = document.createElement('div');
      ov.className = 'verify-overlay';
      ov.id = 'verifyOverlay';
      ov.innerHTML = `
        <div class="verify-spinner-wrap">
          <div class="verify-pulse-ring"></div>
          <div class="verify-spinner"></div>
        </div>
        <div class="verify-title">Verifying Payment…</div>
        <div class="verify-sub">আপনার payment request সফলভাবে submit হয়েছে।<br>সাধারণত <strong style="color:var(--pay-text);">1 minute</strong> এর মধ্যে verify হবে।</div>
        <div class="verify-eta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
          Max wait time: 1 minute
        </div>
        <a href="dashboard.html?tab=payments" class="verify-orders-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.25 4.75h11.5v14.5H6.25V4.75Z"/><path d="M8.75 8.25h6.5M8.75 12h6.5M8.75 15.75h3.5"/></svg>
          View My Orders
        </a>`;
      document.body.appendChild(ov);

      if (!topupDocId) return;

      // Wait for wallet.js to expose _db/_onSnapshot (they load async as module)
      let unsub = null;
      let approved = false;
      const MAX_WAIT_MS = 60000; // 1 minute
      const started = Date.now();

      // Auto-timeout after 1 min — show a friendly message
      const timeout = setTimeout(() => {
        if (approved) return;
        if (unsub) try { unsub(); } catch(e){}
        ov.innerHTML = `
          <div class="verify-spinner-wrap" style="opacity:.35;">
            <div class="verify-spinner"></div>
          </div>
          <div class="verify-title" style="color:var(--pay-muted);">Still Verifying…</div>
          <div class="verify-sub">Admin এখনো verify করেননি। একটু পরে My Orders চেক করুন।</div>
          <a href="dashboard.html?tab=payments" class="verify-orders-btn" style="margin-top:8px;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6.25 4.75h11.5v14.5H6.25V4.75Z"/><path d="M8.75 8.25h6.5M8.75 12h6.5M8.75 15.75h3.5"/></svg>
            Go to My Orders
          </a>`;
      }, MAX_WAIT_MS);

      // Poll every 200ms until wallet.js globals appear, then subscribe
      const trySubscribe = () => {
        if (approved) return;
        if (Date.now() - started > MAX_WAIT_MS) return;

        if (window._db && window._onSnapshot && window._doc && window._collection) {
          try {
            const docRef = window._doc(window._db, 'topups', topupDocId);
            unsub = window._onSnapshot(docRef, (snap) => {
              if (!snap.exists()) return;
              const data = snap.data();
              if (data && (data.status === 'approved' || data.status === 'completed')) {
                approved = true;
                clearTimeout(timeout);
                if (unsub) try { unsub(); } catch(e){}
                showApprovedTick(ov);
              } else if (data && (data.status === 'declined' || data.status === 'cancelled' || data.status === 'rejected')) {
                approved = true;
                clearTimeout(timeout);
                if (unsub) try { unsub(); } catch(e){}
                if (typeof window.showPaymentDeclinedOverlay === 'function') {
                  window.showPaymentDeclinedOverlay(data.declineReason || '');
                }
              }
            });
          } catch(e) {
            console.warn('[verifyOverlay] Firestore listener error:', e);
          }
        } else {
          setTimeout(trySubscribe, 200);
        }
      };
      trySubscribe();
    };

    function showApprovedTick(ov){
      ov.innerHTML = `
        <div class="verify-tick-wrap">
          <div class="verify-tick-ring"></div>
          <div class="verify-tick-circle">
            <svg class="verify-tick-svg" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <div class="verify-approved-title">Payment Approved!</div>
        <div class="verify-approved-sub">আপনার payment সফলভাবে verify হয়েছে।<br>Account এ credit যোগ হয়ে গেছে।</div>`;
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 2200);
    }

    // ── Submit handlers ──
    window.submitTopup = async function(){
      const method = document.getElementById('paymentMethod')?.value;
      const transactionId = document.getElementById('transactionId')?.value.trim();
      if(!method){ showMsg('walletMessage','Payment method select করো।','error'); return; }
      if(!selectedUsdAmount||selectedUsdAmount<1){ showMsg('walletMessage','Minimum $1 amount দিতে হবে।','error'); return; }
      if(!transactionId||transactionId.length<5){ showMsg('walletMessage','Valid Transaction ID দাও।','error'); return; }
      if(window._submitTopupInternal) window._submitTopupInternal({method, transactionId, msgEl:'walletMessage', btnEl:'submitTopupBtn', onSuccess: showVerifyingOverlay});
    };

    window.submitBinanceTopup = async function(){
      const transactionId = document.getElementById('transactionIdBinance')?.value.trim();
      if(!selectedUsdAmount||selectedUsdAmount<1){ showMsg('walletMessageBinance','Amount দিন।','error'); return; }
      if(!transactionId||transactionId.length<5){ showMsg('walletMessageBinance','Valid Binance Order ID দাও।','error'); return; }
      if(window._submitTopupInternal) window._submitTopupInternal({method:'Binance', transactionId, msgEl:'walletMessageBinance', btnEl:'submitBinanceBtn', onSuccess: showVerifyingOverlay});
    };

    window.submitCoinTopup = async function(){
      const method = document.getElementById('paymentMethodCoin')?.value;
      const transactionId = document.getElementById('transactionIdCoin')?.value.trim();
      if(!method){ showMsg('walletMessageCoin','Coin select করুন।','error'); return; }
      if(!selectedUsdAmount||selectedUsdAmount<1){ showMsg('walletMessageCoin','Amount দিন।','error'); return; }
      if(!transactionId||transactionId.length<5){ showMsg('walletMessageCoin','Valid Transaction Hash দাও।','error'); return; }
      if(window._submitTopupInternal) window._submitTopupInternal({method, transactionId, msgEl:'walletMessageCoin', btnEl:'submitCoinBtn', onSuccess: showVerifyingOverlay});
    };

    window._currentSelectedUsd = () => selectedUsdAmount;
    window.handleAmountChange = function(){};
    window.updatePaymentNumber = function(){};
  </script>

  <!-- ── Floating Customer Support Widget ── -->
<div id="floatChatWidget">
  <div id="floatChatWindow" style="display:none;" role="dialog" aria-label="Customer Support Chat">

<style>
#floatChatWidget { position:fixed; bottom:24px; right:24px; z-index:2300; display:flex; flex-direction:column; align-items:flex-end; gap:12px; transition:bottom .25s ease; }
body.has-bottom-nav #floatChatWidget { bottom:100px; right:16px; z-index:2500; }
#floatChatToggle { width:50px; height:50px; border-radius:50%; border:2px solid rgba(0,200,255,.35); background:rgba(8,16,28,.92); backdrop-filter:blur(10px); color:#00c8ff; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 20px rgba(0,200,255,.22); transition:transform .2s,box-shadow .2s; position:relative; }

#floatChatBadge { position:absolute; top:-2px; right:-2px; min-width:18px; height:18px; border-radius:999px; background:#ff5050; color:#fff; font-size:.68rem; font-weight:900; display:flex; align-items:center; justify-content:center; padding:0 4px; border:2px solid #02050a; }

#floatChatHeader { background:rgba(0,200,255,.07); border-bottom:1px solid rgba(0,200,255,.14); padding:14px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px; flex-shrink:0; }

#floatChatAvatar { width:38px; height:38px; border-radius:50%; background:rgba(0,200,255,.12); border:1px solid rgba(0,200,255,.28); display:flex; align-items:center; justify-content:center; color:#00c8ff; flex-shrink:0; }
#floatChatTitle { color:#d0eaff; font-weight:900; font-size:.92rem; }
#floatChatStatus { color:#7a8ca8; font-size:.75rem; display:flex; align-items:center; gap:5px; margin-top:2px; }

.float-form-submit:hover:not(:disabled) { background:linear-gradient(135deg,rgba(0,200,255,.3),rgba(0,255,136,.22)); border-color:rgba(0,200,255,.55); color:#d0f8ff; }

#floatChatInput { flex:1; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.10); border-radius:12px; padding:10px 12px; color:#e8edf5; font-size:.88rem; font-family:inherit; outline:none; transition:border-color .15s; }

#floatChatSend { width:38px; height:38px; border-radius:10px; border:none; background:linear-gradient(135deg,#00c8ff,#00ff88); color:#02050a; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:.18s; }
#floatChatSend:hover:not(:disabled) { transform:scale(1.08); }

@media(max-width:480px){ #floatChatWindow { width:calc(100vw - 28px); } body.has-bottom-nav #floatChatWidget { right:12px; bottom:100px; z-index:2500; } }
